<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie Express</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Header -->
  <header>
    <h1>Foodie Express</h1>
    <p>Delicious food delivered fast</p>
  </header>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" placeholder="Search for dishes or restaurants...">
  </div>

  <!-- Food Grid -->
  <div class="food-grid">
    <div class="food-card">
      <img src="https://images.unsplash.com/photo-1606755962773-bb5b3b6d6f5a" alt="Burger">
      <div class="info">
        <h3>Cheese Burger</h3>
        <p>Juicy grilled burger with melted cheese and fresh veggies.</p>
      </div>
      <button class="order-btn" onclick="addToCart('Cheese Burger')">Add to Cart</button>
    </div>

    <div class="food-card">
      <img src="https://images.unsplash.com/photo-1594007654729-407eedc4f3f0" alt="Pizza">
      <div class="info">
        <h3>Margherita Pizza</h3>
        <p>Classic Italian pizza with mozzarella and basil.</p>
      </div>
      <button class="order-btn" onclick="addToCart('Margherita Pizza')">Add to Cart</button>
    </div>

    <div class="food-card">
      <img src="https://images.unsplash.com/photo-1604908177522-3f6f1e6e6a2a" alt="Noodles">
      <div class="info">
        <h3>Spicy Noodles</h3>
        <p>Hot and flavorful noodles tossed with veggies and sauce.</p>
      </div>
