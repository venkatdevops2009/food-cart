<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Cart</title>
  <link rel="stylesheet" href="start.css">
</head>
<body>
  <h1>Welcome to My Food Cart</h1>

  <!-- Menu Section -->
  <ul id="menu">
    <li>Burger - $5 <button onclick="addToCart('Burger')">Add</button></li>
    <li>Pizza - $8 <button onclick="addToCart('Pizza')">Add</button></li>
    <li>Soda - $2 <button onclick="addToCart('Soda')">Add</button></li>
  </ul>

  <!-- Cart Section -->
  <h2>Your Cart</h2>
  <ul id="cart"></ul>
  <div id="total">Total: $0</div>
  <button id="checkout">Checkout</button>

  <!-- Script -->
  <script src="cart.js"></script>
</body>
</html>
