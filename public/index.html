<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie Express</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Header -->
  <header>Foodie Express</header>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" placeholder="Search for dishes or restaurants...">
  </div>

  <!-- Food Grid -->
  <div class="food-grid">
    <div class="food-card">
      <img src="burger.jpg" alt="Burger">
      <div class="info">
        <h3>Cheese Burger</h3>
        <p>Juicy grilled burger with melted cheese and fresh veggies.</p>
      </div>
      <button class="order-btn">Order Now</button>
    </div>

    <div class="food-card">
      <img src="pizza.jpg" alt="Pizza">
      <div class="info">
        <h3>Margherita Pizza</h3>
        <p>Classic Italian pizza with mozzarella and basil.</p>
      </div>
      <button class="order-btn">Order Now</button>
    </div>

    <div class="food-card">
      <img src="noodles.jpg" alt="Noodles">
      <div class="info">
        <h3>Spicy
